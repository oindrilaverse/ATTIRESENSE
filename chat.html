<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AttireSense AI Chat – Get personalized outfit recommendations from your AI fashion stylist." />
  <title>AttireSense – Your AI Stylist</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* ── Chat Layout ── */
    body { overflow: hidden; height: 100vh; }

    .chat-layout {
      display: flex;
      height: 100vh;
      padding-top: 65px; /* navbar height */
    }

    /* ── Sidebar ── */
    .sidebar { padding: 20px 16px; gap: 0; }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 800;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .sidebar-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      margin-bottom: 20px;
      cursor: pointer;
      transition: var(--transition);
    }
    .sidebar-user:hover {
      border-color: var(--border-glow);
      background: rgba(52,27,110,0.15);
    }
    .sidebar-user-info { flex: 1; min-width: 0; }
    .sidebar-user-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-user-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .profile-pills { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }

    .sidebar-new-chat {
      width: 100%;
      margin-top: auto;
      padding: 11px;
      background: rgba(52,27,110,0.2);
      border: 1.5px solid var(--border-glow);
      border-radius: var(--radius-md);
      color: var(--text-accent);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 16px;
    }
    .sidebar-new-chat:hover {
      background: rgba(52,27,110,0.35);
    }

    /* ── Main Chat Area ── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
      background: var(--bg-primary);
    }

    /* Decorative bg orbs */
    .chat-bg-orb1 {
      position: absolute;
      width: 400px; height: 400px;
      bottom: -100px; right: -100px;
      background: rgba(52,27,110,0.15);
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .chat-bg-orb2 {
      position: absolute;
      width: 300px; height: 300px;
      top: 0; left: -50px;
      background: rgba(96,126,162,0.08);
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }

    /* Messages area */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      gap: 16px;
      animation: fadeIn 0.5s ease;
    }
    .empty-icon {
      width: 72px; height: 72px;
      background: var(--grad-primary);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: var(--shadow-glow);
      animation: float 3s ease-in-out infinite;
    }
    .empty-state h2 { font-size: 1.4rem; }
    .empty-state p  { max-width: 360px; font-size: 0.9rem; }

    /* Starter prompts */
    .starter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
      max-width: 500px;
    }
    .starter-card {
      background: var(--glass-bg);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .starter-card:hover {
      border-color: var(--border-glow);
      background: rgba(52,27,110,0.2);
      color: var(--text-primary);
      transform: translateY(-2px);
    }
    .starter-card .s-icon { font-size: 1.2rem; margin-bottom: 6px; display: block; }
    .starter-card strong { display: block; color: var(--text-primary); font-size: 0.88rem; margin-bottom: 2px; }

    /* Suggestions row */
    .suggestions-row {
      padding: 10px 24px 4px;
      position: relative;
      z-index: 1;
    }

    /* Input area */
    .input-area {
      padding: 16px 24px 20px;
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border-subtle);
      background: rgba(14,20,28,0.8);
      backdrop-filter: blur(10px);
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
      transition: var(--transition);
    }
    .input-row:focus-within {
      border-color: var(--brand-purple-light);
      box-shadow: 0 0 0 3px rgba(74,40,152,0.12);
    }
    #chatInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 0.95rem;
      resize: none;
      max-height: 140px;
      line-height: 1.5;
      font-family: inherit;
    }
    #chatInput::placeholder { color: var(--text-muted); }

    #sendBtn {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--grad-button);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
      font-size: 1rem;
    }
    #sendBtn:hover:not(:disabled) {
      transform: scale(1.08);
      box-shadow: var(--shadow-button);
    }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: center;
    }

    /* Typing indicator bubble */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      width: fit-content;
    }

    /* ── Settings / API Key Modal ── */
    #apiModal {
      display: flex;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #apiModal.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .chat-layout { flex-direction: column; }
      .starter-grid { grid-template-columns: 1fr; max-width: 340px; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">✨</div>
        <span>AttireSense</span>
      </a>
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="btn btn-ghost btn-sm" onclick="openApiModal()" id="apiKeyBtn" title="Configure Gemini API Key">
          🔑 API Key
        </button>
        <a href="onboarding.html" class="btn btn-ghost btn-sm">Edit Profile</a>
      </div>
    </div>
  </nav>

  <!-- Layout -->
  <div class="chat-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- User Profile Summary -->
      <div class="sidebar-user" onclick="window.location='onboarding.html'">
        <div class="avatar" id="sidebarAvatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebarName">Your Profile</div>
          <div class="sidebar-user-sub">Click to edit</div>
        </div>
        <span style="color:var(--text-muted);font-size:0.8rem;">✏️</span>
      </div>

      <div class="sidebar-label">Style Profile</div>
      <div class="profile-pills" id="profilePills">
        <!-- Populated by JS -->
      </div>

      <button class="sidebar-new-chat" onclick="clearChat()">+ New Chat</button>
    </aside>

    <!-- Main Chat -->
    <main class="chat-main">
      <div class="chat-bg-orb1"></div>
      <div class="chat-bg-orb2"></div>

      <!-- Messages -->
      <div class="messages-area" id="messagesArea">
        <!-- Populated by JS -->
      </div>

      <!-- Follow-up Suggestions -->
      <div class="suggestions-row" id="suggestionsRow" style="display:none;"></div>

      <!-- Input -->
      <div class="input-area">
        <div class="input-row">
          <textarea
            id="chatInput"
            rows="1"
            placeholder="Ask me what to wear... e.g. 'What should I wear to a job interview?'"
          ></textarea>
          <button id="sendBtn" onclick="sendMessage()" title="Send message">
            ➤
          </button>
        </div>
        <p class="input-hint">AttireSense · Powered by Gemini AI · Personalized just for you</p>
      </div>
    </main>
  </div>

  <!-- API Key Modal -->
  <div class="modal-overlay" id="apiModal">
    <div class="modal">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
        <div style="width:44px;height:44px;background:var(--grad-primary);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;">🔑</div>
        <div>
          <h3 style="margin:0;">Gemini API Key</h3>
          <p style="margin:0;font-size:0.82rem;">Required to power your AI stylist</p>
        </div>
      </div>
      <p style="font-size:0.88rem;margin-bottom:20px;line-height:1.7;">
        Your key is stored <strong>locally in your browser</strong> only and is never shared.
        Get a free key at <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--text-accent);">Google AI Studio →</a>
      </p>
      <input
        class="input-field"
        type="password"
        id="apiKeyInput"
        placeholder="AIza..."
        style="margin-bottom:16px;"
      />
      <div style="display:flex;gap:10px;">
        <button class="btn btn-ghost" style="flex:1;" onclick="closeApiModal()">Cancel</button>
        <button class="btn btn-primary" style="flex:1;" onclick="confirmApiKey()">Save Key ✓</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
